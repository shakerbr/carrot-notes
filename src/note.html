<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarrotNote</title>
  <style>
    html, body { background: transparent !important; margin: 0; }
    #note-card { background: #FFF2E6; color: #5C2D00; }
  </style>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/note.css">
</head>
<body>

  <div class="window-resize-layer" aria-hidden="true">
    <div class="window-resize-handle resize-n" data-direction="North"></div>
    <div class="window-resize-handle resize-s" data-direction="South"></div>
    <div class="window-resize-handle resize-w" data-direction="West"></div>
    <div class="window-resize-handle resize-e" data-direction="East"></div>
    <div class="window-resize-handle resize-nw" data-direction="NorthWest"></div>
    <div class="window-resize-handle resize-ne" data-direction="NorthEast"></div>
    <div class="window-resize-handle resize-sw" data-direction="SouthWest"></div>
    <div class="window-resize-handle resize-se" data-direction="SouthEast"></div>
  </div>

  <!-- Floating Sticky Note Card -->
  <div class="window-frame">
  <div id="note-card" class="theme-orange">
    

    
    <header id="drag-header">
      <div class="brand">
        <!-- Inlined official carrot-color.svg vector logo -->
        <svg viewBox="0 0 285.75 285.75" class="brand-logo">
          <defs>
            <linearGradient id="swatch3">
              <stop style="stop-color:#f06e10;stop-opacity:1;" offset="0" />
            </linearGradient>
            <linearGradient id="linearGradient3" x1="56.256714" y1="137.34169" x2="153.88815" y2="137.34169" gradientUnits="userSpaceOnUse" xlink:href="#swatch3"/>
          </defs>
          <g transform="matrix(0.54256154,0.54256154,-0.54256154,0.54256154,129.04136,42.770433)">
            <path style="display:inline;fill:#b6530c;fill-opacity:1;stroke:none;stroke-width:0.40573" d="m 62.478393,4.0213842 c 5.207277,-30.5528772 79.251097,-30.5528772 85.059297,0 C 153.34589,34.57426 124.52265,268.03586 105.00804,268.56676 85.493432,269.09767 57.271116,34.57426 62.478393,4.0213842 Z" />
            <path style="display:inline;fill:url(#linearGradient3);stroke:none;stroke-width:0.45607" d="m 104.74658,-24.222294 c -22.355474,0 -44.626488,8.586261 -47.553172,25.7581176 C 51.34004,35.879535 83.063916,299.50101 104.99979,298.90424 126.93567,298.30747 159.33554,35.879535 152.80669,1.5358236 149.54227,-15.636033 127.10205,-24.222294 104.74658,-24.222294 Z M 67.650651,4.3651082 C 77.210394,7.9256279 92.857482,9.686846 103.16218,10.001973 96.123572,15.912061 73.144846,12.665964 67.650651,4.3651082 Z m 76.313689,6.9158568 c -5.49419,8.300856 -28.47292,11.546952 -35.51153,5.636865 10.3047,-0.315128 25.95179,-2.076345 35.51153,-5.636865 z M 75.206779,36.42465 c 7.155073,2.722973 18.888123,4.128427 26.619561,4.419885 C 96.51272,45.242186 79.285593,42.6833 75.206779,36.42465 Z m 59.731241,21.683948 c -4.07881,6.25865 -21.30595,8.817536 -26.61957,4.419885 7.73144,-0.291458 19.4645,-1.696912 26.61957,-4.419885 z M 70.301652,74.199089 c 7.155073,2.722973 18.888123,4.128427 26.619564,4.419885 -5.313623,4.397651 -22.54075,1.838765 -26.619564,-4.419885 z m 55.281378,30.055531 c -4.07881,6.25865 -21.30594,8.81753 -26.619562,4.41988 7.731442,-0.29146 19.464492,-1.6969 26.619562,-4.41988 z m -43.884141,36.01124 c 7.155073,2.72297 18.888111,4.12842 26.619561,4.41988 -5.31363,4.39765 -22.540747,1.83877 -26.619561,-4.41988 z m 41.822251,36.01072 c -4.00748,5.61374 -21.3144,7.56065 -26.86244,2.55798 7.61419,0.79608 19.31501,-0.85607 26.86244,-2.55798 z M 94.635567,210.8786 c 5.549253,2.03359 14.693583,2.34999 20.728453,1.9327 -4.21455,4.82203 -17.633561,3.86876 -20.728453,-1.9327 z" />
            <g style="display:inline">
              <path style="fill:#0c7707;fill-opacity:1;stroke:none;stroke-width:1.35629" d="m 105.07246,-112.50461 c 29.91292,-0.0481 12.59736,88.041022 0,87.421952 -12.59734,-0.619072 -29.91289,-87.373772 0,-87.421952 z" />
              <path style="fill:#0a6306;fill-opacity:1;stroke:none;stroke-width:1.35629" d="m 139.74168,-105.33627 c 27.47923,11.818516 -23.35031,85.817699 -34.66922,80.253612 -11.31889,-5.564081 7.19,-92.072042 34.66922,-80.253612 z" />
              <path style="fill:#0a6306;fill-opacity:1;stroke:none;stroke-width:1.35629" d="m 70.403244,-105.33627 c -27.47923,11.818518 23.350309,85.817702 34.669216,80.253612 11.31889,-5.56408 -7.189997,-92.072042 -34.669216,-80.253612 z" />
            </g>
          </g>
        </svg>
      </div>
      <div id="title-container">
        <!-- Edit Title Button -->
        <button id="edit-title-btn" class="btn-icon no-drag" title="Rename Note" style="width: 18px; height: 18px; padding: 0; background: transparent; border: none; cursor: pointer; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; color: inherit; opacity: 0.6;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 11px; height: 11px;">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <!-- Title display text (dragging works on it) -->
        <span id="note-title-display" style="font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: inherit; pointer-events: none; flex: 1;">Untitled Note</span>
        
        <!-- Cancel Title Edit Button (left of input) -->
        <button id="cancel-title-btn" class="btn-icon no-drag" title="Cancel Editing" style="display: none; width: 18px; height: 18px; padding: 0; background: transparent; border: none; cursor: pointer; flex-shrink: 0; align-items: center; justify-content: center; color: inherit; opacity: 0.6; margin-right: 4px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 12px; height: 12px;">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <input type="text" id="note-title-input" class="no-drag" placeholder="Untitled Note" style="display: none;" />
      </div>

      <div class="header-controls">
        <!-- Actions List wrapper containing primary editor controls -->
        <div id="actions-list" style="display: flex; align-items: center; gap: 4px;">
          <!-- Save button -->
          <button id="save-btn" class="btn-icon no-drag" title="Save changes (Ctrl+S)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
          </button>

          <!-- Lock toggle -->
          <button id="lock-btn" class="btn-icon no-drag" title="Toggle Read-Only Mode">
            <svg id="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
            </svg>
          </button>

          <!-- Color selector dropdown -->
          <div class="dropdown no-drag">
            <button id="color-dropdown-btn" class="btn-icon" title="Change Color">
              <span id="color-btn-dot" class="color-dot-display"></span>
            </button>
            <div id="color-dropdown-menu" class="dropdown-menu color-menu">
              <!-- Colors populated dynamically -->
            </div>
          </div>

          <!-- Font control dropdown -->
          <div class="dropdown no-drag">
            <button id="font-dropdown-btn" class="btn-icon" title="Font Styles">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 7 4 4 20 4 20 7"></polyline>
                <line x1="9" y1="20" x2="15" y2="20"></line>
                <line x1="12" y1="4" x2="12" y2="20"></line>
              </svg>
            </button>
            <div id="font-dropdown-menu" class="dropdown-menu font-menu">
              <div class="menu-title">Font Family</div>
              <div class="font-option" data-font="Caveat" style="font-family: 'Caveat', cursive;">Handwriting</div>
              <div class="font-option" data-font="Inter" style="font-family: 'Inter', sans-serif;">Inter (UI)</div>
              <div class="font-option" data-font="Roboto" style="font-family: 'Roboto', sans-serif;">Roboto</div>
              <div class="font-option" data-font="Courier Prime" style="font-family: 'Courier Prime', monospace;">Monospace</div>
              
              <div class="menu-separator"></div>
              
              <div class="menu-title">Font Size</div>
              <div class="font-sizes">
                <span class="size-btn" data-size="14px">14</span>
                <span class="size-btn" data-size="16px">16</span>
                <span class="size-btn" data-size="18px">18</span>
                <span class="size-btn" data-size="20px">20</span>
                <span class="size-btn" data-size="22px">22</span>
                <span class="size-btn" data-size="24px">24</span>
                <span class="size-btn" data-size="28px">28</span>
              </div>
            </div>
          </div>

          <!-- Formatting options dropdown -->
          <div class="dropdown no-drag">
            <button id="format-dropdown-btn" class="btn-icon" title="Format Text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="9" x2="20" y2="9"></line>
                <line x1="4" y1="15" x2="20" y2="15"></line>
                <line x1="10" y1="3" x2="8" y2="21"></line>
                <line x1="16" y1="3" x2="14" y2="21"></line>
              </svg>
            </button>
            <div id="format-dropdown-menu" class="dropdown-menu format-menu">
              <div class="format-option" data-cmd="bold">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                    <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                  </svg>
                  <span>Bold</span>
                </div>
                <span class="shortcut">Ctrl+B</span>
              </div>
              <div class="format-option" data-cmd="italic">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <line x1="19" y1="4" x2="10" y2="4"></line>
                    <line x1="14" y1="20" x2="5" y2="20"></line>
                    <line x1="15" y1="4" x2="9" y2="20"></line>
                  </svg>
                  <span>Italic</span>
                </div>
                <span class="shortcut">Ctrl+I</span>
              </div>
              <div class="format-option" data-cmd="underline">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <path d="M6 3v7a6 6 0 0 0 12 0V3"></path>
                    <line x1="4" y1="21" x2="20" y2="21"></line>
                  </svg>
                  <span>Underline</span>
                </div>
                <span class="shortcut">Ctrl+U</span>
              </div>
              <div class="format-option" data-cmd="strikeThrough">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <path d="M16 4H9a3 3 0 0 0-2.83 4H19a3 3 0 0 1-2.83 4H7a4 4 0 0 0 4 4h7"></path>
                    <line x1="4" y1="12" x2="20" y2="12"></line>
                  </svg>
                  <span>Strikethrough</span>
                </div>
                <span class="shortcut">Ctrl+Shift+X</span>
              </div>
              <div class="menu-separator"></div>
              <div class="format-option" data-cmd="insertUnorderedList">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                  </svg>
                  <span>Bulled</span>
                </div>
                <span class="shortcut">Ctrl+Shift+L</span>
              </div>
              <div class="format-option" data-cmd="insertOrderedList">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <line x1="10" y1="6" x2="21" y2="6"></line>
                    <line x1="10" y1="12" x2="21" y2="12"></line>
                    <line x1="10" y1="18" x2="21" y2="18"></line>
                    <path d="M4 6h1v4"></path>
                    <path d="M4 10h2"></path>
                    <path d="M6 6H4"></path>
                    <circle cx="5" cy="15" r="1"></circle>
                  </svg>
                  <span>List</span>
                </div>
                <span class="shortcut">Ctrl+Shift+O</span>
              </div>
              <div class="format-option" data-cmd="insertChecklist">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <polyline points="9 11 12 14 22 4"></polyline>
                  </svg>
                  <span>Checklist</span>
                </div>
                <span class="shortcut">Ctrl+Shift+C</span>
              </div>
              <div class="menu-separator"></div>
              <div class="format-option" data-cmd="removeFormat">
                <div class="format-opt-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="format-opt-icon">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                  </svg>
                  <span>Clear Format</span>
                </div>
                <span class="shortcut"></span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- More Button for narrow layout collapse -->
        <button id="more-btn" class="btn-icon no-drag" title="Show controls">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="12" cy="5" r="1.5"></circle>
            <circle cx="12" cy="19" r="1.5"></circle>
          </svg>
        </button>

        <span class="ctrl-separator"></span>

        <!-- Always on Top toggle -->
        <button id="always-top-btn" class="btn-icon no-drag" title="Always on Top">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="8" width="18" height="13" rx="2"></rect>
            <path d="M12 2v6"></path>
            <path d="M8 5l4-3 4 3"></path>
          </svg>
        </button>

        <!-- Close note window -->
        <button id="close-btn" class="btn-icon btn-close no-drag" title="Close note window">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Sub-toolbar for actions collapse -->
    <div id="sub-toolbar"></div>

    <!-- Markdown editor -->
    <div id="editor-host" class="note-editor-host"></div>

    <!-- Format Toast notification overlay -->
    <div id="format-toast"></div>

    <!-- Active formatting indicators container -->
    <div id="active-formats-indicator" class="no-drag"></div>

  </div>
  </div>


  <script src="vendor/tiptap.bundle.js"></script>
  <script src="js/editor-line-format.js"></script>
  <script src="js/markdown-helpers.js"></script>
  <script src="js/note.js"></script>
</body>
</html>
